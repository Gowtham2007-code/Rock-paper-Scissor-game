<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <p class="title">Rock Paper Scissors</p>

        <button onclick="playGame('rock')" class="Button">
                <img src="images/rock-emoji.png" class="moveimage">
        </button>

        <button onclick="playGame('paper')" class="Button">
                <img src="images/paper-emoji.png" class="moveimage">
        </button>
  
        <button onclick="playGame('scissors')" class="Button">
                <img src="images/scissors-emoji.png" class="moveimage">
        </button>

        <p class="js-result result" id="id-result"></p>
        <p class="js-move" style="margin-bottom: 30px;"></p>
        <p class="js-score"></p>

        <button onclick="reSetScore()" class="resetScoreButton">Reset Score</button>
    </center>

    <script src="script.js"></script>
</body>
</html>
