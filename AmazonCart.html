<!DOCTYPE html>
<html>
<head>
    <title>AmazonCart</title>
</head>
<body>
    <button onclick="console.log(quartquantity)">show quantity</button>
    <button onclick="console.log(++quartquantity)">Add product</button>
    <button onclick="console.log(quartquantity += 2)">+2</button>
    <button onclick="console.log(quartquantity += 3)">+3</button>
    <button onclick="console.log(quartquantity = 0)">reset cart</button>

    <script>
        let quartquantity = 0;
    </script>
</body>
</html>
